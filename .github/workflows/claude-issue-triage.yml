name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            Eres un asistente de triage para el repositorio de un juego Tetris en vanilla JavaScript.
            El repositorio tiene estos archivos principales: game.js, index.html, style.css.

            REPOSITORIO: ${{ github.repository }}
            NÚMERO DE ISSUE: ${{ github.event.issue.number }}
            TÍTULO: ${{ github.event.issue.title }}
            CUERPO: ${{ github.event.issue.body }}
            AUTOR: ${{ github.event.issue.user.login }}
            EVENTO: ${{ github.event.action }}

            Realizá las siguientes tareas en orden:

            ## TAREA 1 — Etiquetas

            1. Ejecutá `gh label list` para ver las etiquetas disponibles.
            2. Del siguiente set curado, creá las que no existan usando `gh label create <nombre> --color <hex> --description "<desc>"`:
               - bug (color #d73a4a) — algo no funciona correctamente
               - enhancement (color #a2eeef) — nueva funcionalidad o mejora
               - question (color #d876e3) — se necesita más información o es una pregunta
               - documentation (color #0075ca) — mejoras o correcciones en documentación
               - performance (color #e4e669) — relacionado con rendimiento o velocidad
               - ui (color #f9d0c4) — relacionado con la interfaz visual
               - gameplay (color #bfd4f2) — relacionado con mecánicas del juego
               - needs-info (color #fbca04) — faltan datos para continuar
               - priority:high (color #b60205) — prioridad alta
               - priority:medium (color #e99695) — prioridad media
               - priority:low (color #c5def5) — prioridad baja
            3. Analizá el issue y aplicá las etiquetas correspondientes:
               - Tipo: elegí UNA de [bug, enhancement, question, documentation]
               - Área: podés elegir CERO O MÁS de [performance, ui, gameplay]
               - Prioridad: elegí UNA de [priority:high, priority:medium, priority:low]
               - Si el issue no tiene suficiente información para diagnosticarlo, añadí también `needs-info`
            4. Aplicá las etiquetas elegidas con: `gh issue edit ${{ github.event.issue.number }} --add-label "<label1>,<label2>,..."`

            ## TAREA 2 — Diagnóstico (comentario sticky)

            1. Listá los comentarios del issue con: `gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments`
            2. Buscá si algún comentario del bot contiene el marcador `<!-- claude-issue-triage -->`.
               - Si existe, obtenés su ID y lo actualizás con:
                 `gh api --method PATCH repos/${{ github.repository }}/issues/comments/<ID> -f body='<contenido>'`
               - Si NO existe, creá un comentario nuevo con:
                 `gh issue comment ${{ github.event.issue.number }} --body '<contenido>'`
            3. El cuerpo del comentario debe seguir EXACTAMENTE esta estructura (en español) e incluir el marcador al inicio:

            ```
            <!-- claude-issue-triage -->
            ## 🔍 Diagnóstico del Issue

            > ℹ️ Análisis automático generado por Claude. ${{ github.event.action == 'edited' && '**Diagnóstico actualizado tras edición del issue.**' || '' }}

            ### Resumen
            <resumen claro del problema o solicitud en 2-3 oraciones>

            ### Archivos / componentes afectados
            <lista de archivos del repo que probablemente se vean involucrados, con una breve razón por cada uno>

            ### Causa raíz probable / Enfoque sugerido
            <si es bug: posible causa raíz; si es mejora: enfoque de implementación sugerido>

            ### Pasos de alto nivel para la solución
            1. <paso 1>
            2. <paso 2>
            ...

            ---
            *Etiquetas asignadas: <lista de labels aplicados>*
            ```

            IMPORTANTE:
            - NO modifiques el título ni el cuerpo del issue.
            - NO escribas código de solución, solo el diagnóstico.
            - Respondé siempre en español.

          claude_args: >-
            --allowedTools
            "Read,Glob,Grep,Bash(gh label list:*),Bash(gh label create:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh api:*)"
